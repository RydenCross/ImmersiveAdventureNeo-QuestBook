name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install .[dev,desktop] pip-audit
      - name: Audit Python dependencies
        run: |
          python -m generator quest-maker-dependency-inventory --output dependency-inventory.json
          pip-audit --format json --output dependency-audit.json || true
          python -m generator quest-maker-vulnerability-policy --report dependency-audit.json --format json
      - run: black --check .
      - run: ruff check .
      - run: pytest
      - run: python -m generator quality-gate --format json --output reports/quality-gate.json

      - uses: actions/upload-artifact@v4
        with:
          name: release-analysis-reports
          path: reports/*.json
