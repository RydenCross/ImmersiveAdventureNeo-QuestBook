name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install .[dev]
      - run: black --check .
      - run: ruff check .
      - run: pytest
      - run: python -m generator quality-gate --format json --output reports/quality-gate.json

      - uses: actions/upload-artifact@v4
        with:
          name: release-analysis-reports
          path: reports/*.json
