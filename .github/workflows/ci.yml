name: CI

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install .[dev]

      - run: black --check .

      - run: ruff check .

      - run: pytest

      - run: python -m generator release-check

      - run: python -m generator release-guard

      - run: python -m generator dependency-audit --strict

      - run: python -m generator progression-metrics --format json --output reports/progression-metrics.json

      - run: python -m generator progression-guard --format json --output reports/progression-guard.json

      - run: python -m generator identity-guard --format json --output reports/identity-guard.json

      - uses: actions/upload-artifact@v4
        with:
          name: release-analysis-reports
          path: |
            reports/progression-metrics.json
            reports/progression-guard.json
            reports/identity-guard.json