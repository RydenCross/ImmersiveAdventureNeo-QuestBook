name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install hash-verified CI dependencies
        run: |
          python -m pip install --require-hashes --no-deps --only-binary=:all: -r requirements-ci.lock
          python -m pip install --no-deps .
      - name: Scan repository secrets and workflow permissions
        run: python -m generator repository-security-audit --format json
      - name: Verify dependency lock and license policy
        run: |
          python -m generator dependency-lock-audit --format json
          python -m generator dependency-license-audit --format json
      - name: Audit Python dependencies
        run: |
          python -m generator quest-maker-dependency-inventory --output dependency-inventory.json
          pip-audit --format json --output dependency-audit.json || true
          python -m generator quest-maker-vulnerability-policy --report dependency-audit.json --format json
      - run: black --check .
      - run: ruff check .
      - run: pytest
      - run: python -m generator quality-gate --format json --output reports/quality-gate.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-analysis-reports
          path: reports/*.json
