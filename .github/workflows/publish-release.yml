name: Publish desktop release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic-version tag, for example v1.2.3
        required: true
      prerelease:
        description: Publish as prerelease
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install .[desktop]
      - run: python -m generator quest-maker-native-build --platform ${{ matrix.platform }}
      - run: python -m generator quest-maker-package-build --platform ${{ matrix.platform }}
      - uses: actions/upload-artifact@v4
        with:
          name: ftb-quest-maker-${{ matrix.platform }}
          path: dist/packages/**

  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate update metadata
        run: |
          python -m generator quest-maker-update-metadata \
            --version "${{ inputs.tag }}" \
            --channel ${{ inputs.prerelease && 'beta' || 'stable' }} \
            --artifact "windows=$(find release-assets -type f -name '*.exe' | head -1)" \
            --artifact "linux=$(find release-assets -type f -name '*.AppImage' | head -1)" \
            --output release-assets/update.json
      - name: Publish verified assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf '%s\n' "Automated desktop release ${{ inputs.tag }}" > release-notes.md
          python -m generator quest-maker-github-release-publish \
            --repository "${{ github.repository }}" \
            --tag "${{ inputs.tag }}" \
            --notes release-notes.md \
            --asset release-assets/update.json \
            $(find release-assets -type f ! -name update.json -printf '%p\n' | sed 's/^/--asset /') \
            ${{ inputs.prerelease && '--prerelease' || '' }} \
            --execute
