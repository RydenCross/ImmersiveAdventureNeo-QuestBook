name: Publish desktop release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic-version tag, for example v1.2.3
        required: true
      prerelease:
        description: Publish as prerelease
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Verify release tag matches checked-out source
        shell: bash
        run: |
          python -m generator.release_source_validation \
            --tag "${{ inputs.tag }}" \
            --source-commit "$(git rev-parse HEAD)"
      - name: Install hash-verified release dependencies
        run: |
          python -m pip install --require-hashes --no-deps --only-binary=:all: -r requirements-ci.lock
          python -m pip install --no-deps .
      - run: python -m generator quest-maker-native-build --platform ${{ matrix.platform }}
      - run: python -m generator quest-maker-package-build --platform ${{ matrix.platform }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ftb-quest-maker-${{ matrix.platform }}
          path: dist/packages/**

  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Verify release tag matches checked-out source
        run: |
          python -m generator.release_source_validation \
            --tag "${{ inputs.tag }}" \
            --source-commit "$(git rev-parse HEAD)"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate update metadata
        run: |
          python -m generator quest-maker-update-metadata \
            --version "${{ inputs.tag }}" \
            --channel ${{ inputs.prerelease && 'beta' || 'stable' }} \
            --artifact "windows=$(find release-assets -type f -name '*.exe' | head -1)" \
            --artifact "linux=$(find release-assets -type f -name '*.AppImage' | head -1)" \
            --output release-assets/update.json
      - name: Generate release SBOM and provenance
        run: |
          python -m generator quest-maker-release-sbom \
            --version "${{ inputs.tag }}" \
            $(find release-assets -type f \( -name '*.exe' -o -name '*.AppImage' \) -printf '%p\n' | sed 's/^/--artifact /') \
            --output release-assets/ftb-quest-maker-sbom.cdx.json
          python -m generator quest-maker-release-provenance \
            --repository "https://github.com/${{ github.repository }}" \
            --revision "${{ github.sha }}" \
            --workflow .github/workflows/publish-release.yml \
            $(find release-assets -type f \( -name '*.exe' -o -name '*.AppImage' \) -printf '%p\n' | sed 's/^/--artifact /') \
            --output release-assets/ftb-quest-maker-provenance.intoto.jsonl
      - name: Generate release checksums
        run: |
          python -m generator quest-maker-release-checksums \
            $(find release-assets -type f -printf '%p\n' | sed 's/^/--artifact /') \
            --output release-assets/SHA256SUMS
      - name: Validate release installers and metadata
        run: |
          python -m generator.release_install_validation \
            --assets release-assets \
            --checksums release-assets/SHA256SUMS \
            --update release-assets/update.json
      - name: Generate keyless GitHub artifact attestations
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            release-assets/*.exe
            release-assets/*.AppImage
            release-assets/update.json
            release-assets/SHA256SUMS
            release-assets/*.cdx.json
            release-assets/*.intoto.jsonl
      - name: Publish verified assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf '%s\n' "Automated desktop release ${{ inputs.tag }}" > release-notes.md
          python -m generator quest-maker-github-release-publish \
            --repository "${{ github.repository }}" \
            --tag "${{ inputs.tag }}" \
            --notes release-notes.md \
            --asset release-assets/update.json \
            $(find release-assets -type f ! -name update.json -printf '%p\n' | sed 's/^/--asset /') \
            ${{ inputs.prerelease && '--prerelease' || '' }} \
            --execute
